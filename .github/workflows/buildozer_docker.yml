name: FEAC Sovereign Docker Build
on:
  push:
    branches: [ main, master ]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Ambil Kode (V4)
      - name: Checkout Source
        uses: actions/checkout@v4

      # Langkah 2: Fix Izin File (Penting untuk Docker)
      - name: Fix Permissions
        run: |
          chmod +x main.py
          chmod 777 .

      # Langkah 3: Build dalam Kapsul Docker
      # Action ini sudah berisi Java 17 & SDK yang Benar.
      # Kita tidak perlu install apa-apa lagi.
      - name: Build with Buildozer Docker
        uses: ArtemSerebriakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master
          workdir: .

      # Langkah 4: Upload Hasil APK (V4 - Wajib)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
          compression-level: 0
