name: FEAC Sovereign Stable Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (Fixed for Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y 
            build-essential 
            git 
            ffmpeg 
            libsdl2-dev 
            libsdl2-image-dev 
            libsdl2-mixer-dev 
            libsdl2-ttf-dev 
            libportmidi-dev 
            libswscale-dev 
            libavformat-dev 
            libavcodec-dev 
            zlib1g-dev 
            autoconf 
            libtool 
            pkg-config 
            libncurses-dev 
            cmake 
            libffi-dev 
            libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Force Clean Buildozer Cache
        run: rm -rf .buildozer

      - name: Build with Buildozer
        run: buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-Sovereign-APK
          path: bin/*.apk
