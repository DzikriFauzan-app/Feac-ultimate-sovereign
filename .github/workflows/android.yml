name: Android Build Sovereign
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. FIX JAVA & PYTHON: Gunakan versi terbaru yang didukung API 34
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. OPERASI JALUR SDK (Solusi Error 3)
      - name: Force SDK Path & Licenses
        run: |
          # Buat folder umpan di direktori lokal yang dicari Buildozer
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          
          # Symlink: Hubungkan jalur purba ke jalur modern milik GitHub Runner
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Terima lisensi secara paksa
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      # 3. EKSEKUSI BUILD (Solusi Error 2 - Menghapus ENV pemicu NoSectionError)
      - name: Build with Buildozer
        run: |
          # Jalankan tanpa menyuntikkan variabel APP_ANDROID_SDK ke env shell 
          # agar tidak merusak parser configparser
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      # 4. UPLOAD ARTIFACT V4 (Solusi Error 1)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
