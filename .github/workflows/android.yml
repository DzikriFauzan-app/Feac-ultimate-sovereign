name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. FIX JAVA: Wajib Java 17 untuk Android 14 (API 34)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: pip install buildozer cython==0.29.33

      # 2. FIX SDK PATH & LICENSE (Gunakan Absolute Path untuk menghindari 'command not found')
      - name: Configure Android SDK
        run: |
          # Buat folder tools/bin buatan untuk menipu Buildozer
          mkdir -p $ANDROID_HOME/tools/bin
          
          # Symlink: Hubungkan sdkmanager modern ke lokasi jadul yang dicari Buildozer
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          
          # EKSEKUSI DENGAN PATH LENGKAP (Solusi Error 3)
          echo "Menerima lisensi..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "Install Build Tools..."
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          # Paksa Buildozer menggunakan SDK sistem yang sudah kita patch
          export APP_ANDROID_SDK=$ANDROID_HOME
          export APP_ANDROID_NDK=$ANDROID_HOME/ndk-bundle
          
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      # 3. FIX ARTIFACT UPLOAD (V4 - Solusi Error 2)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
          compression-level: 0
