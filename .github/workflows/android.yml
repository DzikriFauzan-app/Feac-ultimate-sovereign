name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. FIX JAVA: Wajib Java 17 untuk Android API 34
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. VALIDASI FILE (Mencegah Error 3)
      - name: Verify Workspace
        run: |
          ls -la
          if [ ! -f buildozer.spec ]; then
            echo "CRITICAL ERROR: buildozer.spec NOT FOUND!"
            exit 1
          fi

      # 3. FIX SDK PATH (Mencegah Error 2)
      - name: Pre-configure SDK Path
        run: |
          # Paksa buat struktur folder yang Buildozer cari
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          
          # Hubungkan ke SDK sistem GitHub yang stabil
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Terima lisensi secara manual
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      - name: Build APK
        run: |
          # Gunakan perintah buildozer langsung tanpa override ENV berlebih yang bisa merusak parser
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      # 4. FIX ARTIFACT (Mencegah Error 1)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
