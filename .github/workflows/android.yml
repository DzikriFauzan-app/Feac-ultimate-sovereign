name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # 1. FIX JAVA: Wajib Java 17 untuk Android API 34
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. FIX SDK PATH BLINDNESS (Operasi Kunci)
      - name: Fix Android SDK Layout
        run: |
          # Buat folder 'tools/bin' buatan agar Buildozer senang
          mkdir -p $ANDROID_HOME/tools/bin
          
          # Buat Symlink: Arahkan tools/bin/sdkmanager ke cmdline-tools/latest/bin/sdkmanager
          # Ini menipu Buildozer agar mengira dia memakai struktur lama
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          
          # Terima lisensi secara paksa
          yes | sdkmanager --licenses || true
          
          # Install build-tools spesifik
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          # Paksa Buildozer memakai SDK sistem yang sudah kita modifikasi
          export APP_ANDROID_SDK=$ANDROID_HOME
          export APP_ANDROID_NDK=$ANDROID_HOME/ndk-bundle
          
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
