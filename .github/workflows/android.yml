name: FEAC Sovereign Docker Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Checkout Code (Wajib v4)
      - name: Checkout Source
        uses: actions/checkout@v4

      # Langkah 2: Build menggunakan Docker Action
      # Ini otomatis menangani Java, SDK, dan NDK tanpa pusing path
      - name: Build with Buildozer Docker
        uses: ArtemSerebriakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer -v android debug
          buildozer_version: master
          repository_root: .
          workdir: .

      # Langkah 3: Upload Artifact (Wajib v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
          compression-level: 0
