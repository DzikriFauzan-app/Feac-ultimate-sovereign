name: Android Build Sovereign
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. FIX JAVA: Wajib 17 untuk Android API 34+
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. OPERASI JALUR SDK (Solusi Error 2)
      - name: Force SDK Path & Licenses
        run: |
          # Buat folder umpan yang dicari Buildozer
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          
          # Symlink: Arahkan 'jalur purba' ke 'jalur modern'
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Terima lisensi secara paksa menggunakan path absolut
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      # 3. VERIFIKASI FILE (Solusi Error 3)
      - name: Verify Buildozer Spec
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "FATAL: buildozer.spec tidak ditemukan di root repository!"
            ls -R
            exit 1
          fi

      # 4. EKSEKUSI BUILD
      - name: Build with Buildozer
        run: |
          # Beritahu Buildozer lokasi SDK yang valid secara paksa
          export APP_ANDROID_SDK=$ANDROID_HOME
          export APP_ANDROID_NDK=$ANDROID_HOME/ndk-bundle
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      # 5. UPLOAD ARTIFACT V4 (Solusi Error 1)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
