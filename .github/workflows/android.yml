name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev libffi-dev libssl-dev \
            zlib1g-dev openjdk-17-jdk libltdl-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      - name: Accept Android Licenses
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          # Memastikan build-tools terinstall manual jika buildozer gagal
          sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
