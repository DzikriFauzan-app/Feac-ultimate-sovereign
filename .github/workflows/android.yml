name: Android Build Sovereign
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. SETUP JAVA 17 (Wajib untuk API 34)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. OPERASI SHADOW LINK (Memperbaiki Error SDK Path)
      - name: Fix Android SDK Path
        run: |
          # Buat struktur folder yang dicari Buildozer secara paksa
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          
          # Hubungkan sdkmanager modern ke lokasi folder purba
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Terima semua lisensi secara sistem
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      # 3. EKSEKUSI BUILD
      - name: Build with Buildozer
        run: |
          # Beritahu Buildozer lokasi SDK asli milik GitHub Runner
          export APP_ANDROID_SDK=$ANDROID_HOME
          export APP_ANDROID_NDK=$ANDROID_HOME/ndk-bundle
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      # 4. UPLOAD ARTIFACT V4 (Wajib 2024/2025)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
