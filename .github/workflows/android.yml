name: Android Build Final
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # OPERASI INTERVENSI: Paksa buildozer.spec mengikuti sistem GitHub
      - name: Patch Buildozer Spec
        run: |
          sed -i 's/^#\? \?android.sdk =.*/android.sdk = \/usr\/local\/lib\/android\/sdk/' buildozer.spec
          sed -i 's/^#\? \?android.ndk =.*/android.ndk = \/usr\/local\/lib\/android\/sdk\/ndk-bundle/' buildozer.spec
          sed -i 's/^#\? \?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#\? \?android.api =.*/android.api = 34/' buildozer.spec

      - name: Accept Licenses & Install Tools
        run: |
          # Gunakan sdkmanager sistem untuk memastikan API 34 dan Build-tools terpasang
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Build with Buildozer
        run: |
          # Beritahu p4a lokasinya secara eksplisit melalui ENV
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_HOME/ndk-bundle
          export PATH=$PATH:$ANDROID_HOME/platform-tools
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
