name: Android Build Sovereign
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. SETUP LINGKUNGAN (Standard API 34)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      # 2. INJEKSI SPECS (Mencegah NoSectionError & Path Blindness)
      - name: Patch Buildozer Configuration
        run: |
          # Pastikan file ada
          if [ ! -f buildozer.spec ]; then buildozer init; fi
          
          # Injeksi jalur SDK sistem langsung ke file .spec agar Buildozer tidak bingung
          sed -i 's/^#\? \?android.sdk =.*/android.sdk = \/usr\/local\/lib\/android\/sdk/' buildozer.spec
          sed -i 's/^#\? \?android.ndk =.*/android.ndk = \/usr\/local\/lib\/android\/sdk\/ndk-bundle/' buildozer.spec
          sed -i 's/^#\? \?android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#\? \?android.api =.*/android.api = 34/' buildozer.spec
          
          # Terima lisensi di level sistem
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

      # 3. EKSEKUSI MURNI
      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0

      # 4. ARTIFACT V4 (Wajib)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
