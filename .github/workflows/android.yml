name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev libltdl-dev zip unzip

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer & Cython
        run: pip install buildozer cython==0.29.33

      - name: Setup Android SDK & Accept Licenses
        run: |
          # Buat struktur direktori yang dipahami Buildozer
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          
          # Gunakan sdkmanager bawaan GitHub runner untuk menginstal komponen
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          # Paksa terima lisensi
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        run: |
          # Beritahu Buildozer lokasi SDK yang sudah kita siapkan
          export APP_ANDROID_SDK=$ANDROID_HOME
          export APP_ANDROID_NDK=$ANDROID_HOME/ndk-bundle
          buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
          BUILDOZER_WARN_ON_ROOT: 0

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: FEAC-Ultimate-APK
          path: bin/*.apk
