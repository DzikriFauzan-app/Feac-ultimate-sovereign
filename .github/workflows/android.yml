name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev libffi-dev libssl-dev zlib1g-dev openjdk-17-jdk

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Buildozer
        run: pip install buildozer cython==0.29.33

      - name: Build APK
        run: buildozer -v android debug
        env:
          BUILDOZER_ACCEPT_SDK_LICENSE: 1
